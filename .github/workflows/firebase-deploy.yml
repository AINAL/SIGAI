name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18  # Use LTS version

      - name: Install project dependencies
        run: npm ci

      - name: Install Firebase CLI Globally
        run: npm install -g firebase-tools

      - name: Save Service Account JSON
        run: |
          echo '${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}' | jq '.' > $HOME/service-account.json
          echo "Service Account JSON saved at: $HOME/service-account.json"
          ls -l $HOME/service-account.json
          echo "Printing first few lines of service-account.json for debugging:"
          head -n 10 $HOME/service-account.json

      - name: Deploy to Firebase Hosting
        env:
          GOOGLE_APPLICATION_CREDENTIALS: $HOME/service-account.json
        run: firebase deploy --only hosting --project=sigai-backend
